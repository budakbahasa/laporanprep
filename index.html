<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Prep Asrama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            #pdf-content { width: 100%; padding: 0 !important; border: none !important; box-shadow: none !important; }
        }
        textarea { resize: none; overflow: hidden; }
    </style>
</head>
<body class="text-slate-900 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto relative">
        <div class="no-print mb-6 flex flex-col md:flex-row justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <h1 class="text-xl md:text-2xl font-bold text-blue-900 flex items-center gap-3">
                <i class="fas fa-file-alt text-blue-600"></i> Laporan Prep SKPK Kuantan
            </h1>
            <div class="flex gap-2 mt-4 md:mt-0">
                <button onclick="switchTab('form')" id="btn-form" class="px-5 py-2.5 rounded-xl font-medium bg-blue-600 text-white shadow-md">Borang</button>
                <button onclick="switchTab('archive')" id="btn-archive" class="px-5 py-2.5 rounded-xl font-medium bg-slate-100 text-slate-600 hover:bg-slate-200">Arkib</button>
            </div>
        </div>

        <div id="toast" class="no-print hidden fixed top-6 right-6 px-6 py-4 rounded-xl shadow-xl z-50 text-white font-medium bg-slate-800"></div>

        <div id="tab-form" class="block">
            <div class="bg-white shadow-xl rounded-2xl p-6 md:p-10 border border-slate-200">
                <div class="no-print mb-6 flex flex-wrap gap-3 justify-end bg-slate-50 p-4 rounded-xl border border-slate-100 items-center">
                    <button onclick="resetBorang()" class="mr-auto text-slate-500 hover:text-red-600 font-medium text-sm px-3"><i class="fas fa-trash-alt"></i> Borang Baru</button>
                    <button id="pdf-btn" onclick="generatePDF()" class="bg-red-600 text-white px-5 py-2 rounded-xl shadow-md"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button id="save-btn" onclick="saveToSheets()" class="bg-blue-600 text-white px-5 py-2 rounded-xl shadow-md"><i class="fas fa-save"></i> Simpan</button>
                </div>

                <div id="pdf-content" class="bg-white text-black md:p-4">
                    <div class="text-center mb-10">
                        <h1 class="text-2xl font-bold uppercase tracking-widest">Laporan Prep Asrama</h1>
                        <h2 class="text-xl font-bold uppercase mt-2">SK Pendidikan Khas Kuantan</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-4 mb-8 text-sm md:text-base">
                        <div class="flex items-center"><label class="w-32 font-bold uppercase">Hari</label><select id="hari" class="flex-1 border-b border-slate-400 bg-transparent"><option value="">Pilih</option><option value="Isnin">Isnin</option><option value="Selasa">Selasa</option><option value="Rabu">Rabu</option><option value="Khamis">Khamis</option><option value="Jumaat">Jumaat</option><option value="Sabtu">Sabtu</option><option value="Ahad">Ahad</option></select></div>
                        <div class="flex items-center"><label class="w-32 font-bold uppercase">Tempat</label><input type="text" id="tempat" value="Asrama SK Pendidikan Khas Kuantan" class="flex-1 border-b border-slate-400 bg-transparent"></div>
                        <div class="flex items-center"><label class="w-32 font-bold uppercase">Tarikh</label><input type="date" id="tarikh" class="flex-1 border-b border-slate-400 bg-transparent"></div>
                        <div class="flex items-center"><label class="w-32 font-bold uppercase">Kehadiran</label><input type="text" id="kehadiran" class="flex-1 border-b border-slate-400 bg-transparent"></div>
                        <div class="flex items-center"><label class="w-32 font-bold uppercase">Masa</label><input type="time" id="masa" class="flex-1 border-b border-slate-400 bg-transparent"></div>
                        <div class="flex items-center"><label class="w-32 font-bold uppercase">Guru/Warden</label><input type="text" id="guru" class="flex-1 border-b border-slate-400 bg-transparent"></div>
                    </div>

                    <table class="w-full border-collapse border border-slate-900 mb-8">
                        <tbody id="table-body"></tbody>
                    </table>

                    <div class="border border-slate-900 p-5 mb-10 bg-slate-50">
                        <label class="font-bold uppercase block mb-3">Rumusan / Catatan Am:</label>
                        <textarea id="rumusan" class="w-full min-h-[90px] border-none bg-transparent outline-none"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-archive" class="hidden">
            <div class="bg-white shadow-xl rounded-2xl p-6 md:p-8 border border-slate-200">
                <button onclick="loadGoogleSheetsData()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl"><i class="fas fa-sync-alt"></i> Muat Semula Data</button>
                <div class="overflow-x-auto mt-6">
                    <table class="w-full border-collapse">
                        <thead><tr class="bg-slate-100"><th class="p-4">Tarikh</th><th class="p-4">Guru</th><th class="p-4">Tindakan</th></tr></thead>
                        <tbody id="archive-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyRlvdbwdRoa4DQmMLYYS5uooW6cbGH5gJgmFJHgmRX6SbS8IBluKTmLxTy3Qdgt55G/exec";
        let globalRecords = [];
        const ITEMS = ["Kehadiran murid", "Membuat kerja sekolah", "Membaca bahan ilmiah", "Membawa buku", "Disiplin", "Kebersihan diri", "Kesihatan murid", "Catatan kes khas"];

        ITEMS.forEach((item, index) => {
            document.getElementById('table-body').innerHTML += `
            <tr class="border-b border-slate-900">
                <td class="border-r border-slate-900 p-3 text-center font-bold">${index + 1}</td>
                <td class="border-r border-slate-900 p-3">${item}</td>
                <td class="p-0"><textarea id="catatan-${index}" class="w-full p-3 outline-none bg-transparent"></textarea></td>
            </tr>`;
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function switchTab(tab) {
            document.getElementById('tab-form').style.display = tab === 'form' ? 'block' : 'none';
            document.getElementById('tab-archive').style.display = tab === 'archive' ? 'block' : 'none';
            if(tab === 'archive') loadGoogleSheetsData();
        }

        function resetBorang() {
            location.reload();
        }

        async function saveToSheets() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            const payload = {
                tarikh: document.getElementById('tarikh').value,
                hari: document.getElementById('hari').value,
                masa: document.getElementById('masa').value,
                guru: document.getElementById('guru').value,
                kehadiran: document.getElementById('kehadiran').value,
                catatan: Array.from({length: 8}).map((_, i) => document.getElementById(`catatan-${i}`).value),
                rumusan: document.getElementById('rumusan').value
            };
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            showToast("Berjaya Disimpan!");
            btn.disabled = false;
        }

        async function loadGoogleSheetsData() {
            const tbody = document.getElementById('archive-body');
            tbody.innerHTML = "<tr><td colspan='3' class='p-4 text-center'>Memuatkan...</td></tr>";
            try {
                const res = await fetch(WEB_APP_URL);
                globalRecords = await res.json();
                tbody.innerHTML = globalRecords.map((r, i) => `
                    <tr class="border-b">
                        <td class="p-4">${r.tarikh || '-'}</td>
                        <td class="p-4">${r.guru || '-'}</td>
                        <td class="p-4"><button onclick="paparLaporanLama(${i})" class="bg-blue-600 text-white px-3 py-1 rounded">Papar</button></td>
                    </tr>`).join('');
            } catch (err) {
                tbody.innerHTML = "<tr><td colspan='3' class='p-4 text-center text-red-500'>Ralat ketika memuatkan data.</td></tr>";
            }
        }

        function paparLaporanLama(i) {
            const r = globalRecords[i];
            if (!r) return;

            document.getElementById('tarikh').value = r.tarikh || '';
            document.getElementById('hari').value = r.hari || '';
            document.getElementById('guru').value = r.guru || '';
            document.getElementById('rumusan').value = r.rumusan || '';
            
            let catatanArr = [];
            if (r.catatan) {
                if (Array.isArray(r.catatan)) {
                    catatanArr = r.catatan;
                } else if (typeof r.catatan === 'string') {
                    try { catatanArr = JSON.parse(r.catatan); } catch(e) {}
                }
            }
            
            for (let idx = 0; idx < 8; idx++) {
                const el = document.getElementById(`catatan-${idx}`);
                if (el) el.value = catatanArr[idx] || '';
            }
            
            switchTab('form');
        }

        function generatePDF() { html2pdf().from(document.getElementById('pdf-content')).save(); }
    </script>
</body>
</html>
